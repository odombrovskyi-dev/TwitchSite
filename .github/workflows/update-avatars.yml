name: Update Avatars

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-avatars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Install cwebp
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Convert avatars to WebP
        run: node scripts/update-avatars.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/avatars/
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh streamer avatars"
            git push
          else
            echo "No change in avatars"
          fi
